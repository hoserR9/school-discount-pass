<svg xmlns="http://www.w3.org/2000/svg" width="1050" height="600" viewBox="0 0 1050 600">
  <!-- Back of card - white background with sponsor listings -->
  <defs>
    <clipPath id="roundedCardBack">
      <rect x="0" y="0" width="1050" height="600" rx="24" ry="24"/>
    </clipPath>
  </defs>

  <!-- Card background -->
  <rect width="1050" height="600" rx="24" ry="24" fill="white"/>

  <!-- Top border accent -->
  <rect x="0" y="0" width="1050" height="6" rx="3" fill="#002D62"/>

  <!-- "CARD MUST BE PRESENTED FOR DISCOUNT" - left side vertical -->
  <text x="22" y="50" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#002D62" transform="rotate(90, 22, 50)" letter-spacing="1">CARD MUST BE PRESENTED FOR DISCOUNT</text>

  <!-- "IMPORTANT: NOT GOOD WITH ANY OTHER OFFER" - right side vertical -->
  <text x="1028" y="50" font-family="Arial, sans-serif" font-weight="700" font-size="13" fill="#CC0000" transform="rotate(90, 1028, 50)" letter-spacing="1">IMPORTANT: NOT GOOD WITH ANY OTHER OFFER</text>

  <!-- Divider lines creating a 3-column, 4-row grid -->
  <!-- Vertical dividers -->
  <line x1="390" y1="30" x2="390" y2="570" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="720" y1="30" x2="720" y2="570" stroke="#E0E0E0" stroke-width="1"/>
  <!-- Horizontal dividers -->
  <line x1="55" y1="170" x2="995" y2="170" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="55" y1="310" x2="995" y2="310" stroke="#E0E0E0" stroke-width="1"/>
  <line x1="55" y1="450" x2="995" y2="450" stroke="#E0E0E0" stroke-width="1"/>

  <!-- Row 1 -->
  <!-- Baskin Robbins -->
  <rect x="70" y="45" width="60" height="40" rx="4" fill="#F5F0E6"/>
  <text x="100" y="70" font-family="Arial Black, sans-serif" font-size="10" fill="#002D62" text-anchor="middle">BR</text>
  <text x="140" y="65" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#002D62">Baskin Robbins</text>
  <text x="140" y="82" font-family="Arial, sans-serif" font-size="11" fill="#666">BOGO 50% off scoops</text>
  <text x="140" y="96" font-family="Arial, sans-serif" font-size="10" fill="#999">1 per customer</text>

  <!-- Harland Brewing -->
  <rect x="400" y="45" width="60" height="40" rx="4" fill="#F5F0E6"/>
  <text x="430" y="70" font-family="Arial Black, sans-serif" font-size="10" fill="#002D62" text-anchor="middle">HB</text>
  <text x="470" y="65" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#002D62">Harland Brewing</text>
  <text x="470" y="82" font-family="Arial, sans-serif" font-size="11" fill="#666">10% off</text>

  <!-- Board &amp; Brew -->
  <rect x="730" y="45" width="60" height="40" rx="4" fill="#F5F0E6"/>
  <text x="760" y="70" font-family="Arial Black, sans-serif" font-size="10" fill="#002D62" text-anchor="middle">B&amp;B</text>
  <text x="800" y="65" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#002D62">Board &amp; Brew</text>
  <text x="800" y="82" font-family="Arial, sans-serif" font-size="11" fill="#666">10% off</text>

  <!-- Row 2 -->
  <!-- L&amp;L Hawaiian Barbecue -->
  <rect x="70" y="185" width="60" height="40" rx="4" fill="#F5F0E6"/>
  <text x="100" y="210" font-family="Arial Black, sans-serif" font-size="10" fill="#002D62" text-anchor="middle">L&amp;L</text>
  <text x="140" y="205" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#002D62">L&amp;L Hawaiian BBQ</text>
  <text x="140" y="222" font-family="Arial, sans-serif" font-size="11" fill="#666">10% off</text>

  <!-- Kahoots -->
  <rect x="400" y="185" width="60" height="40" rx="4" fill="#F5F0E6"/>
  <text x="430" y="210" font-family="Arial Black, sans-serif" font-size="10" fill="#002D62" text-anchor="middle">K</text>
  <text x="470" y="205" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#002D62">Kahoots</text>
  <text x="470" y="222" font-family="Arial, sans-serif" font-size="11" fill="#666">20% off treats &amp; bones</text>

  <!-- Mostra Coffee -->
  <rect x="730" y="185" width="60" height="40" rx="4" fill="#F5F0E6"/>
  <text x="760" y="210" font-family="Arial Black, sans-serif" font-size="10" fill="#002D62" text-anchor="middle">MC</text>
  <text x="800" y="205" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#002D62">Mostra Coffee</text>
  <text x="800" y="222" font-family="Arial, sans-serif" font-size="11" fill="#666">10% off</text>

  <!-- Row 3 -->
  <!-- Rosinas -->
  <rect x="70" y="325" width="60" height="40" rx="4" fill="#F5F0E6"/>
  <text x="100" y="350" font-family="Arial Black, sans-serif" font-size="10" fill="#002D62" text-anchor="middle">R</text>
  <text x="140" y="345" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#002D62">Rosinas</text>
  <text x="140" y="362" font-family="Arial, sans-serif" font-size="11" fill="#666">10% off</text>

  <!-- Donut Touch -->
  <rect x="400" y="325" width="60" height="40" rx="4" fill="#F5F0E6"/>
  <text x="430" y="350" font-family="Arial Black, sans-serif" font-size="10" fill="#002D62" text-anchor="middle">DT</text>
  <text x="470" y="345" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#002D62">Donut Touch</text>
  <text x="470" y="362" font-family="Arial, sans-serif" font-size="11" fill="#666">10% off</text>

  <!-- Sushi Ken -->
  <rect x="730" y="325" width="60" height="40" rx="4" fill="#F5F0E6"/>
  <text x="760" y="350" font-family="Arial Black, sans-serif" font-size="10" fill="#002D62" text-anchor="middle">SK</text>
  <text x="800" y="345" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#002D62">Sushi Ken</text>
  <text x="800" y="362" font-family="Arial, sans-serif" font-size="11" fill="#666">20% off, dine-in/carry out</text>

  <!-- Row 4 -->
  <!-- Flippin Pizza -->
  <rect x="70" y="465" width="60" height="40" rx="4" fill="#F5F0E6"/>
  <text x="100" y="490" font-family="Arial Black, sans-serif" font-size="10" fill="#002D62" text-anchor="middle">FP</text>
  <text x="140" y="485" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#002D62">Flippin Pizza</text>
  <text x="140" y="502" font-family="Arial, sans-serif" font-size="11" fill="#666">$5 off orders over $15</text>
  <text x="140" y="516" font-family="Arial, sans-serif" font-size="10" fill="#999">1 per customer</text>

  <!-- Round Table Pizza -->
  <rect x="400" y="465" width="60" height="40" rx="4" fill="#F5F0E6"/>
  <text x="430" y="490" font-family="Arial Black, sans-serif" font-size="10" fill="#002D62" text-anchor="middle">RT</text>
  <text x="470" y="485" font-family="Arial, sans-serif" font-weight="700" font-size="14" fill="#002D62">Round Table Pizza</text>
  <text x="470" y="502" font-family="Arial, sans-serif" font-size="11" fill="#666">10% off (Rancho Bernardo)</text>

  <!-- QR code placeholder -->
  <rect x="750" y="460" width="100" height="100" rx="4" fill="white" stroke="#002D62" stroke-width="2"/>
  <text x="800" y="510" font-family="Arial, sans-serif" font-size="10" fill="#002D62" text-anchor="middle">QR CODE</text>
  <text x="800" y="525" font-family="Arial, sans-serif" font-size="8" fill="#999" text-anchor="middle">Scan for digital card</text>

  <!-- Bottom border accent -->
  <rect x="0" y="594" width="1050" height="6" rx="3" fill="#C5A55A"/>
</svg>
