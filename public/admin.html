<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DN Nighthawk — Admin Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      max-width: 900px;
      margin: 0 auto 24px;
    }
    .header h1 { color: #C5A55A; font-size: 22px; }
    .header a { color: #C5A55A; text-decoration: none; font-size: 14px; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      max-width: 900px;
      margin: 0 auto 32px;
    }
    .stat-card {
      background: #141b2d;
      border: 1px solid #1e2a42;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }
    .stat-card .number { font-size: 36px; font-weight: 800; color: #C5A55A; }
    .stat-card .label { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-top: 4px; }

    .section { max-width: 900px; margin: 0 auto 32px; }
    .section h2 { color: #C5A55A; font-size: 16px; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #141b2d;
      border-radius: 12px;
      overflow: hidden;
    }
    th { background: #1e2a42; color: #C5A55A; font-size: 11px; text-transform: uppercase; letter-spacing: 1px; padding: 12px 16px; text-align: left; }
    td { padding: 10px 16px; border-bottom: 1px solid #1e2a42; font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(197,165,90,0.05); }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }
    .badge-active { background: rgba(26,122,26,0.2); color: #4caf50; }
    .badge-inactive { background: rgba(204,0,0,0.2); color: #f44336; }
    .btn-deactivate {
      background: none;
      border: 1px solid #f44336;
      color: #f44336;
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 11px;
      cursor: pointer;
    }
    .btn-deactivate:hover { background: rgba(244,67,54,0.1); }
    .empty { text-align: center; padding: 40px; color: #666; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Nighthawk Card Admin</h1>
    <a href="/">Back to Card Page</a>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="number" id="totalCards">-</div>
      <div class="label">Cards Issued</div>
    </div>
    <div class="stat-card">
      <div class="number" id="activeCards">-</div>
      <div class="label">Active Cards</div>
    </div>
    <div class="stat-card">
      <div class="number" id="totalScans">-</div>
      <div class="label">Total Scans</div>
    </div>
  </div>

  <div class="section">
    <h2>Usage by Business</h2>
    <table id="bizTable">
      <thead><tr><th>Business</th><th>Total Scans</th><th>Unique Cards</th><th>Last Scan</th></tr></thead>
      <tbody id="bizBody"><tr><td colspan="4" class="empty">Loading...</td></tr></tbody>
    </table>
  </div>

  <div class="section">
    <h2>All Cards</h2>
    <table id="cardsTable">
      <thead><tr><th>Card ID</th><th>Holder</th><th>Issued</th><th>Valid Thru</th><th>Scans</th><th>Status</th><th></th></tr></thead>
      <tbody id="cardsBody"><tr><td colspan="7" class="empty">Loading...</td></tr></tbody>
    </table>
  </div>

  <script>
    async function loadDashboard() {
      const [statsRes, cardsRes] = await Promise.all([
        fetch('/api/stats'),
        fetch('/api/cards')
      ]);
      const stats = await statsRes.json();
      const cards = await cardsRes.json();

      document.getElementById('totalCards').textContent = stats.totalCards;
      document.getElementById('activeCards').textContent = stats.activeCards;
      document.getElementById('totalScans').textContent = stats.totalScans;

      // Business table
      const bizBody = document.getElementById('bizBody');
      if (stats.byBusiness.length === 0) {
        bizBody.innerHTML = '<tr><td colspan="4" class="empty">No scans recorded yet</td></tr>';
      } else {
        bizBody.innerHTML = stats.byBusiness.map(b => `
          <tr>
            <td>${b.business_name || 'Unknown'}</td>
            <td>${b.total_scans}</td>
            <td>${b.unique_cards}</td>
            <td>${b.last_scan || '-'}</td>
          </tr>
        `).join('');
      }

      // Cards table
      const cardsBody = document.getElementById('cardsBody');
      if (cards.length === 0) {
        cardsBody.innerHTML = '<tr><td colspan="7" class="empty">No cards issued yet</td></tr>';
      } else {
        cardsBody.innerHTML = cards.map(c => `
          <tr>
            <td><strong>${c.card_id}</strong></td>
            <td>${c.holder_name || 'General'}</td>
            <td>${c.issued_at}</td>
            <td>${c.valid_thru}</td>
            <td>${c.scan_count}</td>
            <td><span class="badge ${c.is_active ? 'badge-active' : 'badge-inactive'}">${c.is_active ? 'Active' : 'Inactive'}</span></td>
            <td>${c.is_active ? `<button class="btn-deactivate" onclick="deactivate('${c.card_id}')">Deactivate</button>` : ''}</td>
          </tr>
        `).join('');
      }
    }

    async function deactivate(cardId) {
      if (!confirm('Deactivate card ' + cardId + '? This cannot be undone.')) return;
      await fetch('/api/cards/' + cardId + '/deactivate', { method: 'POST' });
      loadDashboard();
    }

    loadDashboard();
    // Auto-refresh every 30 seconds
    setInterval(loadDashboard, 30000);
  </script>
</body>
</html>
